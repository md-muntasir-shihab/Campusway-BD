services:
  - type: web
    name: campusway-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: FRONTEND_URL
        value: https://campuswaybd.web.app
      - key: MONGO_URI
        sync: false # Set this in the Render dashboard manually for security!
      - key: FIREBASE_PROJECT_ID
        value: campuswaybd
      - key: FIREBASE_CLIENT_EMAIL
        value: firebase-adminsdk-fbsvc@campuswaybd.iam.gserviceaccount.com
      - key: FIREBASE_PRIVATE_KEY
        sync: false # Set this in the Render dashboard manually for security!
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_ORIGIN
        value: https://campuswaybd.web.app
      - key: CORS_ORIGIN
        value: https://campuswaybd.web.app,https://campuswaybd.firebaseapp.com
      - key: BACKEND_URL
        value: https://campusway-backend.onrender.com
      - key: UPSTASH_REDIS_REST_URL
        value: https://equipped-badger-94770.upstash.io
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false # Set this in the Render dashboard manually for security!
      - key: CACHE_ENABLED
        value: "true"
      - key: CACHE_PREFIX
        value: "cw:"
      - key: ALLOW_DEFAULT_SETUP
        value: "true"
      - key: ADMIN_SECRET_PATH
        value: campusway-secure-admin

